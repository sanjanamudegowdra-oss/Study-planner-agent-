<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner Agent</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 20px;
        }

        .container {
            margin-top: 50px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        #results {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<header>
    <h1>Study Planner Agent</h1>
</header>

<div class="container">

    <input type="text" id="searchInput" placeholder="Search topics...">
    <button onclick="performSearch()">Search</button>

    <div id="results"></div>

</div>

<script>
function performSearch() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let resultsDiv = document.getElementById("results");

    const topics = ["mathematics", "physics", "chemistry", "biology", "computer"];

    let found = topics.filter(t => t.includes(input));

    if (found.length > 0) {
        resultsDiv.innerHTML = "Found: " + found.join(", ");
    } else {
        resultsDiv.innerHTML = "No results found";
    }
}
</script>

</body>
</html>
